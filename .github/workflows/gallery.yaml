name: Gallery Verify and Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/gallery_verify_and_test.yaml"
      - "shared/very_yummy_coffee_ui/gallery/**"
      - "shared/very_yummy_coffee_ui/**"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/**"
      - "shared/very_yummy_coffee_ui/gallery/**"
      - "shared/very_yummy_coffee_ui/**"

jobs:
  verify_and_test:
    name: Verify and Test
    defaults:
      run:
        working-directory: shared/very_yummy_coffee_ui/gallery

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.2
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: 📦 Install Dependencies
        run: |
          flutter pub global activate very_good_cli
          very_good packages get --recursive --ignore=!*

      - name: ✨ Check Formatting
        run: dart format --set-exit-if-changed lib
      
      - name: 🕵️ Analyze
        run: flutter analyze lib