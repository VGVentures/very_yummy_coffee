name: Api Verify and Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/api_verify_and_test.yaml"
      - ".claude/worktrees/kind-volhard/api/**"
      - "shared/very_yummy_coffee_models/**"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/**"
      - ".claude/worktrees/kind-volhard/api/**"
      - "shared/very_yummy_coffee_models/**"

jobs:
  verify_and_test:
    name: Verify and Test
    defaults:
      run:
        working-directory: .claude/worktrees/kind-volhard/api

    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: 📦 Install Dependencies
        run: dart pub get

      - name: ✨ Check Formatting
        run: dart format --set-exit-if-changed lib test routes
      
      - name: 🕵️ Analyze
        run: dart analyze --fatal-infos --fatal-warnings routes test

      - name: 🧪 Run Tests
        run: |
          dart pub global activate coverage 1.15.0
          dart test -j 4 --coverage=coverage --platform=vm && dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib,routes