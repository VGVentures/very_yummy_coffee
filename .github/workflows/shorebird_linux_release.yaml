name: Shorebird Linux Release

# Manual Shorebird release for Linux. Linux targets must be built on Linux (see
# scripts/shorebird_platforms.sh). Only apps with a linux/ folder are built;
# in this repo that is menu_board_app by default.

on:
  workflow_dispatch:
    inputs:
      apps:
        description: >-
          Comma-separated Shorebird app aliases (menu, kds, kiosk, mobile, pos).
          Apps without linux/ are skipped by the script.
        required: false
        default: menu
        type: string

concurrency:
  group: shorebird-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Shorebird release (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
      API_KEY: ${{ secrets.API_KEY }}
      PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
      # Must match the Flutter revision used for other platforms of the same app version in
      # Shorebird (see scripts/shorebird_release_all.sh SHOREBIRD_FLUTTER_VERSION). Update when
      # you bump the app version and re-release all platforms together, or remove if unused.
      SHOREBIRD_FLUTTER_VERSION: dc4c75c344c6fa5eb1f6fd380cbfdfb9bb109847

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: Check Shorebird token
        run: |
          if [ -z "${SHOREBIRD_TOKEN}" ]; then
            echo "::error::Add repository secret SHOREBIRD_TOKEN (Shorebird Console → Account → API Keys)."
            exit 1
          fi

      # Host Flutter/Dart for very_good + pub get. setup-shorebird does not put `dart` on PATH.
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.2
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-:hash:-${{ hashFiles('**/pubspec.lock') }}

      - name: 🐦 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📦 Install Very Good CLI and dependencies
        run: |
          dart pub global activate very_good_cli
          very_good packages get -r

      # GitHub-hosted Ubuntu images omit GTK dev packages; CMake needs gtk+-3.0 (libgtk-3-dev).
      - name: 🐧 Install Flutter Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: 🚀 Shorebird release (Linux)
        run: |
          ./scripts/shorebird_release_all.sh --apps="${{ inputs.apps }}" --platforms=linux

      # Flutter / Shorebird Linux release output (executable + lib/, data/, etc.)
      - name: 📤 Upload Linux release bundles
        uses: actions/upload-artifact@v4
        with:
          name: shorebird-linux-${{ github.run_number }}
          path: applications/*/build/linux/x64/release/bundle
          if-no-files-found: warn
