# Codemagic CI/CD — Very Yummy Coffee monorepo
#
# One workflow per application and platform. Build machines match the target OS:
#   - linux_x2: Android, Linux desktop, Web
#   - mac_mini_m2: iOS, macOS (Apple SDK required)
#
# Apps and platforms (from applications/*/ and shared/.../gallery):
#   mobile_app:     android, ios, macos, web
#   pos_app:        ios, macos (no android/)
#   kds_app:        android, ios, macos
#   kiosk_app:      android, ios, macos
#   menu_board_app: android, ios, linux, macos
#   gallery:        macos, web (widgetbook)
#
# iOS jobs use --no-codesign so they compile without Apple signing in Codemagic.
# Swap for flutter build ipa + ios_signing / xcode-project use-profiles when ready.
#
# Monorepo: run dependency install from repo root, then build inside each app directory.

workflows:
  # --- mobile_app (Linux hosts) ---
  mobile-app-android:
    name: Mobile App — Android
    instance_type: linux_x2
    max_build_duration: 60
    working_directory: .
    environment:
      flutter: 3.41.2
      java: 17
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
    scripts:
      - name: Install dependencies (monorepo)
        script: |
          dart pub global activate very_good_cli
          very_good packages get -r
      - name: Build Android APK
        script: |
          cd applications/mobile_app
          flutter build apk --release --build-number=$CM_BUILD_NUMBER
    artifacts:
      - applications/mobile_app/build/**/outputs/**/*.apk
      - applications/mobile_app/build/**/outputs/**/mapping.txt

  mobile-app-web:
    name: Mobile App — Web
    instance_type: linux_x2
    max_build_duration: 60
    working_directory: .
    environment:
      flutter: 3.41.2
      java: 17
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Install dependencies (monorepo)
        script: |
          dart pub global activate very_good_cli
          very_good packages get -r
      - name: Build Web
        script: |
          cd applications/mobile_app
          flutter build web --release
    artifacts:
      - applications/mobile_app/build/web/**

  # --- mobile_app (macOS hosts) ---
  mobile-app-ios:
    name: Mobile App — iOS (compile, no codesign)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: .
    environment:
      flutter: 3.41.2
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
    scripts:
      - name: Install dependencies (monorepo)
        script: |
          dart pub global activate very_good_cli
          very_good packages get -r
      - name: Install CocoaPods
        script: find applications/mobile_app -name Podfile -execdir pod install \;
      - name: Build iOS (no codesign)
        script: |
          cd applications/mobile_app
          flutter build ios --release --no-codesign --build-number=$CM_BUILD_NUMBER
    artifacts:
      - applications/mobile_app/build/ios/**/*.app
      - /tmp/xcodebuild_logs/*.log

  mobile-app-macos:
    name: Mobile App — macOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: .
